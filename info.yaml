# Tiny Tapeout project information
project:
  title:        "Traffic Light FSM"      # Project title
  author:       "Eric Kiecksee"      # Your name
  discord:      "kieckenwama"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Simple traffic light FSM for intersection with main road, side road and pedestrian phases"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     12000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_Kieckenwama_Traffic_LIGHT_FSM"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_Kieckenwama_Traffic_LIGHT_FSM.v"
    - "Top.v"
    - "Traffic_Light.v"
    - "Timer.v"


# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Pedestrian Button"
  ui[1]: "NC"
  ui[2]: "NC"
  ui[3]: "NC"
  ui[4]: "NC"
  ui[5]: "NC"
  ui[6]: "NC"
  ui[7]: "NC"

  # Outputs
  uo[0]: "Main Green"
  uo[1]: "Main Yellow"
  uo[2]: "Main Red"
  uo[3]: "Side Green"
  uo[4]: "Side Yellow"
  uo[5]: "Side Red"
  uo[6]: "Pedestrian Green"
  uo[7]: "Pedestrian Red"

  # Bidirectional pins
  uio[0]: "NC"
  uio[1]: "NC"
  uio[2]: "NC"
  uio[3]: "NC"
  uio[4]: "NC"
  uio[5]: "NC"
  uio[6]: "NC"
  uio[7]: "NC"

# Do not change!
yaml_version: 6
